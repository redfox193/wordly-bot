services:
  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  bot:
    build: ./bot
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
